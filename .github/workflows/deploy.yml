name: Build and Push to DockerHub

on:
  push:
    branches: [ "**" ]

jobs:
  build-and-push:
    # This MUST match the label of your self-hosted runner
    runs-on: unraid

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Ensure this points to your specific Dockerfile if it's not in the root
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gamevault:${{ github.ref_name }}