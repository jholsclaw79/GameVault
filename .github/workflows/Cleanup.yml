name: Delete tags from DockerHub

on:
  delete:
    branches: [ "**" ]

jobs:
  delete-tag:
    runs-on: unraid
    if: github.event.ref_type == 'branch' && github.event.ref != 'main'

    steps:
      - name: Delete Docker Hub Tag
        uses: xhofe/del-docker-tag@main
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gamevault:${{ github.ref_name }}